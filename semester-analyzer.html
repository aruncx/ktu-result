<body>
  <div id="root"></div>

  <!-- React, ReactDOM, htm -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>

  <!-- Recharts (depends on React, Prop-Types) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

  <script>
    /* ── Setup ──────────────────────────────────────────────────────── */
    const html = htm.bind(React.createElement);
    const { useState, useCallback, useEffect, useRef, useMemo } = React;
    const RC = window.Recharts;

    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    /* ── CONSTANTS ──────────────────────────────────────────────────── */
    const GP = { S: 10, 'A+': 9, A: 8.5, 'B+': 8, B: 7, 'C+': 6, C: 5, D: 4, F: 0, FE: 0, I: 0, Ab: 0, Absent: 0, Withheld: 0 };
    const OK = new Set(['S', 'A+', 'A', 'B+', 'B', 'C+', 'C', 'D', 'P']);
    const DC = ['var(--accent)', 'var(--accent)', '#f78166', 'var(--green)', 'var(--gold)', '#79c0ff', '#ff7b72', '#56d364'];
    const DEPT_MAP = {
      CSE: 'Computer Science & Engineering', ECE: 'Electronics & Communication',
      EEE: 'Electrical & Electronics', ME: 'Mechanical Engineering',
      CE: 'Civil Engineering', IT: 'Information Technology',
      AIM: 'Artificial Intelligence and Machine Learning'
    };

    /* ── ANALYSIS ENGINE ────────────────────────────────────────────── */
    function analyze(semesters) {
      const allStusGlobal = semesters.flatMap(sem => sem.departments.flatMap(d => d.students));
      const yearsGlobal = allStusGlobal.map(s => parseInt(s.admissionYear)).filter(y => !isNaN(y));
      const globalMaxYear = yearsGlobal.length > 0 ? Math.max(...yearsGlobal) : null;

      return semesters.map(sem => {
        const depts = sem.departments.map(dept => {
          const targetStudents = globalMaxYear ? dept.students.filter(s => parseInt(s.admissionYear) === globalMaxYear) : dept.students;
          const tot = targetStudents.length;
          const pass = targetStudents.filter(s => s.allPassed).length;
          const avgSGPA = tot ? targetStudents.reduce((a, s) => a + parseFloat(s.sgpa), 0) / tot : 0;
          const sm = {};
          targetStudents.forEach(stu => stu.subjects.forEach(sub => {
            if (!sm[sub.code]) sm[sub.code] = { code: sub.code, name: sub.name, total: 0, passed: 0 };
            sm[sub.code].total++;
            if (sub.passed) sm[sub.code].passed++;
          }));
          const subjects = Object.values(sm).map(s => ({ ...s, failed: s.total - s.passed, pp: s.total ? ((s.passed / s.total) * 100).toFixed(1) : '0' }));
          return { ...dept, students: targetStudents, tot, pass, fail: tot - pass, pp: tot ? ((pass / tot) * 100).toFixed(1) : '0', avgSGPA: avgSGPA.toFixed(2), subjects };
        }).sort((a, b) => parseFloat(b.pp) - parseFloat(a.pp));

        const totS = depts.reduce((a, d) => a + d.tot, 0);
        const totP = depts.reduce((a, d) => a + d.pass, 0);
        const allSubs = depts.flatMap(d => d.subjects);
        const sorted = [...allSubs].sort((a, b) => parseFloat(a.pp) - parseFloat(b.pp));
        return {
          ...sem, departments: depts,
          ov: {
            totS, totP, totF: totS - totP, pp: totS ? ((totP / totS) * 100).toFixed(1) : '0',
            best: depts[0], worst: depts[depts.length - 1], tough: sorted[0], easiest: sorted[sorted.length - 1], allSubs
          }
        };
      });
    }
    /* ── PDF PARSER (robust multi-strategy) ─────────────────────────── */
    function normDept(s) {
      const l = s.toLowerCase().trim();
      if (l.includes('computer') || l === 'cse') return 'CSE';
      if (l.includes('electronics') || l.includes('communication') || l === 'ece') return 'ECE';
      if (l.includes('electrical') || l === 'eee') return 'EEE';
      if (l.includes('mechanical') || l === 'me') return 'ME';
      if (l.includes('civil') || l === 'ce') return 'CE';
      if (l.includes('information') || l === 'it') return 'IT';
      if (l.includes('artificial') || l.includes('machine') || l === 'aim' || l === 'ad') return 'AIM';
      const clean = s.trim().toUpperCase();
      if (['CODE', 'COUR', 'STRE', 'PROG', 'BRAN'].includes(clean.slice(0, 4))) return 'UNK';
      const m = s.match(/[A-Z]{2,4}(?=\d)/); if (m) return m[0].slice(0, 3);
      return clean.slice(0, 4) || 'UNK';
    }

    function deptFromRegNo(r) {
      const m = r.match(/^L?[A-Z]{3,}\d{2}([A-Z]{2,3})\d+/i);
      if (!m) return null;
      const c = m[1].toUpperCase();
      const MAP = {
        'CS': 'CSE', 'CSE': 'CSE', 'EC': 'ECE', 'ECE': 'ECE', 'EE': 'EEE', 'EEE': 'EEE',
        'ME': 'ME', 'CE': 'CE', 'IT': 'IT', 'AD': 'AIM', 'AM': 'AIM', 'AIM': 'AIM'
      };
      return MAP[c] || c;
    }

    function cleanGrade(raw) {
      const s = raw.replace(/[^A-Za-z+]/g, '').toUpperCase();
      const MAP = {
        'S': 'S', 'A+': 'A+', 'A': 'A', 'B+': 'B+', 'B': 'B', 'C+': 'C+', 'C': 'C', 'D': 'D', 'P': 'P',
        'F': 'F', 'FE': 'FE', 'I': 'I', 'AB': 'Ab', 'ABSENT': 'Ab', 'WITHHELD': 'Withheld'
      };
      return MAP[s] ?? s;
    }

    const GRADE_RE = /^(S|A\+|A|B\+|B|C\+|C|D|P|F|FE|I|Ab|AB|Absent|Withheld)$/i;
    const CODE_RE = /^[A-Z]{2,6}\d{3,4}[A-Z]?$/;
    const REG_RE = /[A-Z]{2,5}\d{2,4}[A-Z]{1,5}\d{2,4}/;

    function parseTxt(txt) {
      const lines = txt.split(/\r?\n/);
      const students = [];
      const subNameMap = {};
      let cur = null;

      const pushCur = () => { if (cur && cur.subjects.length > 0) students.push(finishStu(cur)); };

      for (let li = 0; li < lines.length; li++) {
        const line = lines[li];
        const raw = line.trim();
        if (!raw) continue;

        // ── Course Definitions (Code -> Name) ────────────────────────
        // KTU PDFs often have a table of Code and Course Name
        const subDefMatch = raw.match(/([A-Z]{2,6}\d{3,4}[A-Z]?)\s+([A-Z][A-Z\d\s,.:/()-]{5,150})/i);
        // Ensure it's not a student record or mixed data
        if (subDefMatch && !raw.includes('(') && !REG_RE.test(raw)) {
          const code = subDefMatch[1].toUpperCase();
          const name = subDefMatch[2].trim();
          if (!subNameMap[code] || subNameMap[code] === 'Subject') subNameMap[code] = name;
        }

        // ── Register number (multiple label variants) ────────────────
        const rnLabel = raw.match(
          /(?:Reg(?:ister)?(?:\s*No\.?|Number|\.|No)|Roll\s*No\.?|Enroll(?:ment)?\s*No\.?|Reg\.?\s*No\.?)[:\s.-]*([A-Z0-9]{8,15})/i
        );
        // Or a bare reg-no token on its own line or at start
        const rnBare = !rnLabel && (REG_RE.exec(raw) || raw.match(/^[A-Z]{3}\d{2}[A-Z]{2}\d{3}$/));
        const rnVal = rnLabel ? rnLabel[1] : rnBare ? rnBare[0] : null;

        if (rnVal) {
          pushCur();
          const cleanRn = rnVal.replace(/["']/g, '').trim();
          const dept = deptFromRegNo(cleanRn) || 'Unknown';
          cur = {
            regNo: cleanRn,
            department: dept,
            subjects: [],
            lateral: cleanRn.toUpperCase().startsWith('L'),
            admissionYear: '20' + (cleanRn.match(/[A-Z]{3,}(\d{2})/)?.[1] || '??')
          };
        }

        if (!cur) continue;
        const words = raw.split(/\s+/);

        // ── Branch / Programme / Department ─────────────────────────
        const dpLabel = raw.match(
          /(?:Branch|Programme(?:me)?|Department|Course(?!\s*Code)|Stream)\s*[:\s.-]+(.{3,60}?)(?:\s{2,}|$)/i
        );
        if (dpLabel) { cur.department = normDept(dpLabel[1]); }

        // ── Subject grade rows ───────────────────────────────────────
        // Strategy 1: "CODE(GRADE)" or "CODE [GRADE]" or "CODE {GRADE}"
        const subWithGradeMatch = raw.match(/([A-Z]{2,6}\d{3,4}[A-Z]?)\s*[([({]\s*([A-Za-z+]{1,10})\s*[)\]})]/i);
        if (subWithGradeMatch) {
          const code = subWithGradeMatch[1].toUpperCase();
          const grade = cleanGrade(subWithGradeMatch[2]);
          if (GRADE_RE.test(grade) && !cur.subjects.find(s => s.code === code)) {
            const name = subNameMap[code] || 'Subject';
            cur.subjects.push({ code, name, grade, passed: OK.has(grade), gp: GP[grade] ?? 0 });
            // Might be multiple on one line
            let remaining = raw.replace(subWithGradeMatch[0], '');
            while (true) {
              const next = remaining.match(/([A-Z]{2,6}\d{3,4}[A-Z]?)\s*[([({]\s*([A-Za-z+]{1,10})\s*[)\]})]/i);
              if (!next) break;
              const c = next[1].toUpperCase();
              const n = subNameMap[c] || 'Subject';
              const g = cleanGrade(next[2]);
              if (GRADE_RE.test(g) && !cur.subjects.find(s => s.code === c)) {
                cur.subjects.push({ code: c, name: n, grade: g, passed: OK.has(g), gp: GP[g] ?? 0 });
              }
              remaining = remaining.replace(next[0], '');
            }
          }
        }

        // Strategy 2: "CODE  Subject Name  Grade" (2+ spaces as separator)
        if (CODE_RE.test(words[0])) {
          const parts = raw.split(/\s{2,}/);
          if (parts.length >= 2) {
            const code = parts[0].trim();
            const gradeToken = cleanGrade(parts[parts.length - 1]);
            const name = parts.slice(1, parts.length - 1).join(' ').trim() || 'Subject';
            if (GRADE_RE.test(gradeToken) && !cur.subjects.find(s => s.code === code)) {
              cur.subjects.push({ code, name, grade: gradeToken, passed: OK.has(gradeToken), gp: GP[gradeToken] ?? 0 });
            }
          }
        }

        // Strategy 3: Multi-token fallback (scans line for any code followed by a grade)
        for (let i = 0; i < words.length - 1; i++) {
          const possibleCode = words[i].toUpperCase();
          if (CODE_RE.test(possibleCode)) {
            // Check next few tokens for a grade
            for (let j = 1; j <= 3 && (i + j) < words.length; j++) {
              const possibleGrade = cleanGrade(words[i + j]);
              if (GRADE_RE.test(possibleGrade)) {
                if (!cur.subjects.find(s => s.code === possibleCode)) {
                  cur.subjects.push({ code: possibleCode, name: subNameMap[possibleCode] || 'Subject', grade: possibleGrade, passed: OK.has(possibleGrade), gp: GP[possibleGrade] ?? 0 });
                  i += j; // Skip the grade token
                }
                break;
              }
            }
          }
        }
      }

      pushCur();

      // ── Fallback: token-scan the entire text ─────────────────────
      // Tries to extract students from an unstructured blob by finding
      // reg-no → name words → branch → grade patterns in sequence.
      if (students.length === 0) {
        const tokens = txt.split(/\s+/);
        let fc = null;
        for (let ti = 0; ti < tokens.length; ti++) {
          const t = tokens[ti];
          if (REG_RE.test(t) && t.length >= 9) {
            if (fc && fc.subjects.length > 0) students.push(finishStu(fc));
            fc = { regNo: t, name: 'Unknown', department: deptFromRegNo(t) || 'Unknown', subjects: [] };
          } else if (fc && CODE_RE.test(t)) {
            // next non-empty token after code text might be grade
            let gi = ti + 1;
            while (gi < tokens.length && !GRADE_RE.test(cleanGrade(tokens[gi])) && gi < ti + 8) gi++;
            if (gi < tokens.length) {
              const grade = cleanGrade(tokens[gi]);
              if (GRADE_RE.test(grade) && !fc.subjects.find(s => s.code === t)) {
                const name = subNameMap[t] || 'Subject';
                fc.subjects.push({ code: t, name, grade, passed: OK.has(grade), gp: GP[grade] ?? 0 });
                ti = gi;
              }
            }
          }
        }
        if (fc && fc.subjects.length > 0) students.push(finishStu(fc));
      }

      if (!students.length) return null;

      // Group by department
      const dm = {};
      students.forEach(s => {
        const d = s.department || 'Unknown';
        if (!dm[d]) dm[d] = { code: d, name: DEPT_MAP[d] || d, students: [] };
        dm[d].students.push(s);
      });
      return [{ id: 'uploaded', label: 'Uploaded Semester', departments: Object.values(dm) }];
    }

    function finishStu(s) {
      const cred = s.subjects.length * 4, gp = s.subjects.reduce((a, x) => a + x.gp * 4, 0);
      return { ...s, sgpa: cred ? (gp / cred).toFixed(2) : 0, allPassed: s.subjects.every(x => x.passed) };
    }

    async function parsePDF(file) {
      const lib = window.pdfjsLib; if (!lib) throw new Error('PDF.js not loaded');
      const buf = await file.arrayBuffer();
      const pdf = await lib.getDocument({ data: buf }).promise;
      // Extract text per page preserving line breaks via y-position grouping
      let fullTxt = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        // Group items by y-position (same line = within 3px)
        const byY = {};
        tc.items.forEach(item => {
          const y = Math.round(item.transform[5] / 3) * 3; // bucket to 3px rows
          if (!byY[y]) byY[y] = [];
          byY[y].push(item);
        });
        // Sort y descending (PDF y=0 is bottom), then sort items left-to-right
        const ys = Object.keys(byY).map(Number).sort((a, b) => b - a);
        ys.forEach(y => {
          byY[y].sort((a, b) => a.transform[4] - b.transform[4]);
          fullTxt += byY[y].map(x => x.str).join(' ') + '\n';
        });
        fullTxt += '\n';
      }
      return parseTxt(fullTxt);
    }

    /* ── TINY COMPONENTS ────────────────────────────────────────────── */
    function CTip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      return html`<div style=${{ background: '#161b22', border: '1px solid #30363d', borderRadius: 8, padding: '8px 12px', fontSize: 12 }}>
    <p style=${{ color: '#8b949e', marginBottom: 4 }}>${label}</p>
    ${payload.map((p, i) => html`<p key=${i} style=${{ color: p.color, margin: '2px 0' }}>${p.name}: <strong>${typeof p.value === 'number' ? p.value.toFixed(1) : p.value}%</strong></p>`)}
  </div>`;
    }
    function ProgBar({ pct, color = 'var(--green)', h = 6 }) {
      return html`<div style=${{ height: h, borderRadius: h / 2, background: 'rgba(255,255,255,0.08)', overflow: 'hidden', width: '100%' }}>
    <div style=${{ height: '100%', width: `${Math.min(pct, 100)}%`, background: color, borderRadius: h / 2, transition: 'width .8s ease' }}/>
  </div>`;
    }
    function Badge({ label, ok }) {
      return html`<span style=${{
        display: 'inline-flex', alignItems: 'center', padding: '2px 8px', borderRadius: 20, fontSize: 11, fontWeight: 600,
        background: ok ? 'rgba(16,217,168,.15)' : 'rgba(244,63,94,.15)', color: ok ? 'var(--green)' : 'var(--red)',
        border: `1px solid ${ok ? 'rgba(16,217,168,.3)' : 'rgba(244,63,94,.3)'}`
      }}>${label}</span>`;
    }
    function StatCard({ icon, label, value, color = 'var(--accent)', dark }) {
      return html`<div style=${{
        background: dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)',
        border: `1px solid ${dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.1)'}`,
        borderRadius: 12, padding: '18px 20px', display: 'flex', alignItems: 'center', gap: 16
      }}>
    <div style=${{ width: 48, height: 48, borderRadius: 10, background: `${color}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>${icon}</div>
    <div>
      <div style=${{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '.06em', color: dark ? '#8b949e' : '#64748b', marginBottom: 4 }}>${label}</div>
      <div style=${{ fontFamily: "var(--font-mono)", fontSize: 22, fontWeight: 700, color }}>${value}</div>
    </div>
  </div>`;
    }

    /* ── MAIN APP ───────────────────────────────────────────────────── */
    function KTUAnalyzer() {
      const [theme, setTheme] = useState(document.documentElement.getAttribute('data-theme') || 'dark');
      const dark = theme === 'dark' || theme === 'medium';

      const toggleTheme = useCallback(() => {
        const themes = ['dark', 'medium', 'light'];
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = themes[(themes.indexOf(current) + 1) % themes.length];
        document.documentElement.setAttribute('data-theme', next);
        setTheme(next);
      }, []);
      const [tab, setTab] = useState('upload');
      const [rawSems, setRawSems] = useState(null);
      const [analysis, setAnalysis] = useState(null);
      const [selSem, setSelSem] = useState(0);
      const [loading, setLoading] = useState(false);
      const [dragOver, setDragOver] = useState(false);
      const [uploadErr, setUploadErr] = useState('');
      const [search, setSearch] = useState('');
      const [deptFilter, setDeptFilter] = useState('ALL');
      const [aiState, setAiState] = useState({ loading: false, data: null, err: null });
      const fileRef = useRef();

      const handleFile = useCallback(async (file) => {
        if (!file || file.type !== 'application/pdf') { setUploadErr('Please upload a valid PDF file.'); return; }
        setLoading(true); setUploadErr('');
        try {
          const raw = await parsePDF(file);
          if (!raw || !raw[0]?.departments?.length) { setUploadErr('Could not extract data. Try sample data instead.'); setLoading(false); return; }
          setRawSems(raw); setAnalysis(analyze(raw)); setTab('overview'); setSelSem(0);
        } catch (e) { setUploadErr(`Parse error: ${e.message}`); }
        setLoading(false);
      }, []);

      const onDrop = useCallback(e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }, [handleFile]);
      const sem = analysis?.[selSem];

      const filteredStudents = useMemo(() => {
        if (!sem) return [];
        const all = sem.departments.flatMap(d => d.students);
        const byDept = deptFilter === 'ALL' ? all : all.filter(s => s.department === deptFilter);
        if (!search) return byDept;
        const q = search.toLowerCase();
        return byDept.filter(s => s.regNo.toLowerCase().includes(q));
      }, [sem, search, deptFilter]);

      const exportExcel = () => {
        if (!sem || !window.XLSX) return;
        const XL = window.XLSX;
        const wb = XL.utils.book_new();
        const semLabel = sem.label || 'Semester';

        /* ── Style Factories ──────────────────────────────────────────────── */
        const bd = (s = 'thin', c = 'CCCCCC') => ({ top: { style: s, color: { rgb: c } }, bottom: { style: s, color: { rgb: c } }, left: { style: s, color: { rgb: c } }, right: { style: s, color: { rgb: c } } });
        const S = {
          title: { font: { name: 'Calibri', bold: true, sz: 16, color: { rgb: '1A3A6E' } }, fill: { fgColor: { rgb: 'D6E4F7' }, patternType: 'solid' }, alignment: { horizontal: 'center', vertical: 'center' }, border: bd('thin', 'A0B8D8') },
          info: { font: { name: 'Calibri', sz: 10, italic: true, color: { rgb: '3A4D6B' } }, fill: { fgColor: { rgb: 'EBF3FB' }, patternType: 'solid' }, alignment: { horizontal: 'center', vertical: 'center' }, border: bd('thin', 'C0D4EE') },
          hdr: { font: { name: 'Calibri', bold: true, sz: 12, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: '1B4F9B' }, patternType: 'solid' }, alignment: { horizontal: 'center', vertical: 'center', wrapText: true }, border: bd('medium', '1B4F9B') },
          secGreen: { font: { name: 'Calibri', bold: true, sz: 12, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: '2D6A4F' }, patternType: 'solid' }, alignment: { horizontal: 'left', vertical: 'center' }, border: bd('thin', '2D6A4F') },
          secBlue: { font: { name: 'Calibri', bold: true, sz: 12, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: '1B3A6B' }, patternType: 'solid' }, alignment: { horizontal: 'left', vertical: 'center' }, border: bd('thin', '1B3A6B') },
          even: { font: { name: 'Calibri', sz: 11 }, fill: { fgColor: { rgb: 'FFFFFF' }, patternType: 'solid' }, alignment: { horizontal: 'center', vertical: 'center' }, border: bd() },
          odd: { font: { name: 'Calibri', sz: 11 }, fill: { fgColor: { rgb: 'E8F0FE' }, patternType: 'solid' }, alignment: { horizontal: 'center', vertical: 'center' }, border: bd() },
          evenL: { font: { name: 'Calibri', sz: 11 }, fill: { fgColor: { rgb: 'FFFFFF' }, patternType: 'solid' }, alignment: { horizontal: 'left', vertical: 'center' }, border: bd() },
          oddL: { font: { name: 'Calibri', sz: 11 }, fill: { fgColor: { rgb: 'E8F0FE' }, patternType: 'solid' }, alignment: { horizontal: 'left', vertical: 'center' }, border: bd() },
          pass: { font: { name: 'Calibri', bold: true, sz: 11, color: { rgb: '155724' } }, fill: { fgColor: { rgb: 'D4EDDA' }, patternType: 'solid' }, alignment: { horizontal: 'center', vertical: 'center' }, border: bd('thin', 'C3E6CB') },
          fail: { font: { name: 'Calibri', bold: true, sz: 11, color: { rgb: '7B1D1D' } }, fill: { fgColor: { rgb: 'F8D7DA' }, patternType: 'solid' }, alignment: { horizontal: 'center', vertical: 'center' }, border: bd('thin', 'F5C6CB') },
          warn: { font: { name: 'Calibri', sz: 11, color: { rgb: '856404' } }, fill: { fgColor: { rgb: 'FFF3CD' }, patternType: 'solid' }, alignment: { horizontal: 'center', vertical: 'center' }, border: bd('thin', 'FFEEBA') },
          gold: { font: { name: 'Calibri', bold: true, sz: 11, color: { rgb: '7B5200' } }, fill: { fgColor: { rgb: 'FFF3CD' }, patternType: 'solid' }, alignment: { horizontal: 'center', vertical: 'center' }, border: bd('thin', 'FFEEBA') },
        };

        function sty(ws, r, c, style) { const ref = XL.utils.encode_cell({ r, c }); if (!ws[ref]) ws[ref] = { v: '', t: 's' }; ws[ref].s = style; }
        function styRange(ws, r1, c1, r2, c2, style) { for (let r = r1; r <= r2; r++) for (let c = c1; c <= c2; c++) sty(ws, r, c, style); }
        function autoW(aoa) { const nc = Math.max(...aoa.map(r => r.length), 0), w = Array(nc).fill(10); aoa.forEach(row => row.forEach((v, ci) => { const l = String(v ?? '').length; if (l > w[ci]) w[ci] = Math.min(l + 3, 45); })); return w.map(wch => ({ wch })); }
        function mkRows(h, n) { return Array(n).fill({ hpt: h }); }
        function passPct(p) { return p >= 75 ? S.pass : p < 50 ? S.fail : S.warn; }
        function sgpaS(sg, odd) { return sg >= 8 ? S.pass : sg < 5 ? S.fail : (odd ? S.odd : S.even); }
        function rowS(odd, text) { return odd ? (text ? S.oddL : S.odd) : (text ? S.evenL : S.even); }
        function addFooter(ws, aoa, nc) {
          const cr = aoa.length + 49;  // 50 rows after last data row

          };
          if (!ws['!merges']) ws['!merges'] = [];

        }

        /* ── SHEET 1: Departments ─────────────────────────────────────────── */
        (() => {
          const NC = 8, totS = sem.departments.reduce((a, d) => a + d.tot, 0), totP = sem.departments.reduce((a, d) => a + d.pass, 0);
          const dat = sem.departments.map((d, i) => [i + 1, d.code, d.name || DEPT_MAP[d.code] || d.code, d.tot, d.pass, d.fail, parseFloat(d.pp), parseFloat(d.avgSGPA)]);
          const aoa = [

          const ws = XL.utils.aoa_to_sheet(aoa);
          ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: NC - 1 } }, { s: { r: 1, c: 0 }, e: { r: 1, c: NC - 1 } }, { s: { r: 2, c: 0 }, e: { r: 2, c: NC - 1 } }];
          ws['!cols'] = autoW(aoa); ws['!rows'] = [{ hpt: 32 }, { hpt: 18 }, { hpt: 8 }, { hpt: 24 }, ...mkRows(21, dat.length)];
          ws['!freeze'] = { xSplit: 0, ySplit: 4, topLeftCell: 'A5', activePane: 'bottomLeft', state: 'frozen' };
          ws['!autofilter'] = { ref: XL.utils.encode_range({ s: { r: 3, c: 0 }, e: { r: 3 + dat.length, c: NC - 1 } }) };
          styRange(ws, 0, 0, 0, NC - 1, S.title); styRange(ws, 1, 0, 1, NC - 1, S.info); styRange(ws, 2, 0, 2, NC - 1, S.info);
          styRange(ws, 3, 0, 3, NC - 1, S.hdr);
          dat.forEach((row, ri) => {
            const r = 4 + ri, odd = ri % 2 === 1;
            row.forEach((v, ci) => {
              let st;
              if (ci === 0 && ri === 0) st = S.gold;
              else if (ci === 6) st = passPct(parseFloat(v));
              else if (ci === 7) st = sgpaS(parseFloat(v), odd);
              else if (ci === 2) st = rowS(odd, true);
              else st = rowS(odd, false);
              sty(ws, r, ci, st);
            });

          addFooter(ws, aoa, NC);

        })();

        /* ── SHEET 2: Subjects (per-department tables) ───────────────────── */
        (() => {
          const NC = 6;  // Subject Code, Subject Name, Total, Passed, Failed, Pass%

          const totalSubs = sem.departments.reduce((a, d) => a + d.subjects.length, 0);

          // Sheet-level title

          merges.push({ s: { r: cr, c: 0 }, e: { r: cr, c: NC - 1 } }); rowH.push({ hpt: 32 }); rowStyles.push('sheetTitle'); cr++;

          aoa.push([`Total Subjects: ${totalSubs}   |   Departments: ${sem.departments.length}`]);
          merges.push({ s: { r: cr, c: 0 }, e: { r: cr, c: NC - 1 } }); rowH.push({ hpt: 18 }); rowStyles.push('info'); cr++;

          ws['!cols'] = autoW(aoa); ws['!rows'] = [{ hpt: 32 }, { hpt: 18 }, { hpt: 8 }, { hpt: 24 }, ...mkRows(21, dat.length)];

          styRange(ws, 0, 0, 0, NC - 1, S.title); styRange(ws, 1, 0, 1, NC - 1, S.info); styRange(ws, 2, 0, 2, NC - 1, S.info);
          styRange(ws, 3, 0, 3, NC - 1, S.hdr);
          dat.forEach((row, ri) => {
            const r = 4 + ri, odd = ri % 2 === 1;

              let st;
              if (ci === 4) st = v === 'PASS' ? S.pass : S.fail;

              else st = rowS(odd, false);

        /* ── PER-DEPARTMENT SHEETS ────────────────────────────────────────── */
        sem.departments.forEach(dept => {

          merges.push({ s: { r: 1, c: 0 }, e: { r: 1, c: maxC } });

            row.forEach((v, ci) => {
              let st;
              if (ci === 2) st = v === 'PASS' ? S.pass : S.fail;
              else if (ci === 1) st = sgpaS(parseFloat(v), odd);

        ${aiState.loading && html`
          <div class="card" style=${{ padding: '56px', textAlign: 'center' }}>
            <div style=${{ fontSize: 40, marginBottom: 16, color: 'var(--accent)' }} class="pulse">✦</div>
            <div style=${{ fontFamily: "var(--font-head)", fontSize: 20, letterSpacing: '.06em', color: 'var(--accent)', marginBottom: 8 }}>ANALYZING DATA…</div>
            <div style=${{ color: mu, fontSize: 13 }}>Claude is processing result patterns</div>
          </div>`}

        ${aiState.data && html`<div>
          ${aiState.data.summary && html`
            <div class="card" style=${{ padding: '20px 24px', marginBottom: 16, borderLeft: '3px solid var(--accent)' }}>
              <div style=${{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '.09em', color: 'var(--accent)', marginBottom: 8, fontWeight: 600 }}>Executive Summary</div>
              <p style=${{ fontSize: 14, lineHeight: 1.75, color: txt }}>${aiState.data.summary}</p>
            </div>`}
          <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 16 }}>
            ${aiState.data.insights?.map((ins, i) => {
            const colMap = { positive: 'var(--green)', warning: 'var(--gold)', critical: 'var(--red)', info: 'var(--accent)' };
            const icoMap = { positive: '✓', warning: '⚠', critical: '✗', info: '◈' };
            const c = colMap[ins.type] || 'var(--accent)';
            return html`<div key=${i} class="card" style=${{ padding: '18px 20px', borderLeft: `3px solid ${c}` }}>
                <div style=${{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                  <span style=${{ fontSize: 14, color: c, flexShrink: 0, marginTop: 1 }}>${icoMap[ins.type] || '◈'}</span>
                  <div>
                    <div style=${{ fontWeight: 600, fontSize: 13, marginBottom: 6, color: c }}>${ins.title}</div>
                    <div style=${{ fontSize: 13, color: mu, lineHeight: 1.65 }}>${ins.detail}</div>
                  </div>
                </div>
              </div>`;
          })}
          </div>
          ${aiState.data.recommendations?.length > 0 && html`
            <div class="card" style=${{ padding: '20px 24px', marginBottom: 16 }}>
              <div style=${{ fontFamily: "var(--font-head)", fontSize: 16, fontWeight: 700, letterSpacing: '.03em', marginBottom: 14 }}>RECOMMENDATIONS</div>
              ${aiState.data.recommendations.map((rec, i) => html`
                <div key=${i} style=${{ display: 'flex', gap: 12, padding: '10px 0', borderBottom: i < aiState.data.recommendations.length - 1 ? `1px solid ${dark ? 'rgba(48,54,61,.5)' : 'rgba(0,0,0,.08)'}` : '' }} >
                  <div style=${{ width: 24, height: 24, borderRadius: 6, background: 'rgba(167,139,250,.12)', border: '1px solid rgba(167,139,250,.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 600, color: 'var(--accent)', flexShrink: 0 }}>${i + 1}</div>
                  <div style=${{ fontSize: 13, lineHeight: 1.65, color: txt }}>${rec}</div>
                </div>`)}
            </div>`}
          <div style=${{ textAlign: 'center' }}>
            <button onClick=${genAI} class="btn" style=${{ padding: '9px 22px', background: 'rgba(167,139,250,.08)', color: 'var(--accent)', border: '1px solid rgba(167,139,250,.2)', fontSize: 13 }}>↺ Regenerate</button>
          </div>
        </div>`}

        ${aiState.err && html`
          <div class="card" style=${{ padding: '32px', textAlign: 'center', borderLeft: '3px solid var(--red)' }}>
            <div style=${{ color: 'var(--red)', fontWeight: 600, marginBottom: 8 }}>✗ Error</div>
            <div style=${{ color: mu, fontSize: 13, marginBottom: 20 }}>${aiState.err}</div>
            <button onClick=${genAI} class="btn" style=${{ padding: '9px 22px', background: 'rgba(244,63,94,.1)', color: 'var(--red)', border: '1px solid rgba(244,63,94,.25)', fontSize: 13 }}>Try Again</button>
          </div>`}
      </div>`}

      </main>
    </div>
  </div>`;
    }

    // Basic deterrent for Right Click & Inspect
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => {
      if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(KTUAnalyzer));
  </script>
</body>

</html>
