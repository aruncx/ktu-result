<html lang="en" data-theme="dark">

<head>

    content="Free KTU Result Analyser — analyse APJ Abdul Kalam University batch & semester results, CGPA trends, student rankings and backlog analysis.">

  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">

    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="css/unified.css">
  <style>
    .card {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(12px);
      transition: all 0.3s ease-in-out;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1), 0 0 20px rgba(124, 110, 245, 0.15);
      border-color: var(--accent) !important;
    }

    .btn:hover {
      box-shadow: 0 4px 15px rgba(124, 110, 245, 0.3);
      filter: brightness(1.1);
    }

    .nav-active {
      background: linear-gradient(90deg, rgba(124, 110, 245, 0.15) 0%, transparent 100%) !important;

<body>
  <div id="root"></div>

  <!-- React, ReactDOM, htm -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>

  <!-- Firebase (Web SDK) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>


  <!-- Recharts -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <script>
    /* ── Setup ── */
    const html = htm.bind(React.createElement);
    const { useState, useCallback, useEffect, useRef, useMemo } = React;
    const RC = window.Recharts;

    /* ── TINY COMPONENTS ── */
    function CTip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      return html`<div style=${{ background: '#161b22', border: '1px solid #30363d', borderRadius: 8, padding: '8px 12px', fontSize: 12 }}>
        <p style=${{ color: '#8b949e', marginBottom: 4 }}>${label}</p>
        ${payload.map((p, i) => html`<p key=${i} style=${{ color: p.color, margin: '2px 0' }}>${p.name}: <strong>${typeof p.value === 'number' ? p.value.toFixed(1) : p.value}%</strong></p>`)}
      </div>`;
    }
    function ProgBar({ pct, color = 'var(--green)', h = 6 }) {
      return html`<div style=${{ height: h, borderRadius: h / 2, background: 'rgba(255,255,255,0.08)', overflow: 'hidden', width: '100%' }}>
        <div style=${{ height: '100%', width: `${Math.min(pct, 100)}%`, background: color, borderRadius: h / 2, transition: 'width .8s ease' }}/>
      </div>`;
    }
    function Badge({ label, ok }) {
      return html`<span style=${{ display: 'inline-flex', alignItems: 'center', padding: '2px 8px', borderRadius: 20, fontSize: 11, fontWeight: 600, background: ok ? 'rgba(16,217,168,.15)' : 'rgba(244,63,94,.15)', color: ok ? 'var(--green)' : 'var(--red)', border: `1px solid ${ok ? 'rgba(16,217,168,.3)' : 'rgba(244,63,94,.3)'}` }}>${label}</span>`;
    }
    function StatCard({ icon, label, value, color = 'var(--accent)', dark }) {
      return html`<div style=${{ background: dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)', border: `1px solid ${dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.1)'}`, borderRadius: 12, padding: '18px 20px', display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style=${{ width: 48, height: 48, borderRadius: 10, background: `${color}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>${icon}</div>
        <div>
          <div style=${{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '.06em', color: dark ? '#8b949e' : '#64748b', marginBottom: 4 }}>${label}</div>
          <div style=${{ fontFamily: "var(--font-mono)", fontSize: 22, fontWeight: 700, color }}>${value}</div>
        </div>
      </div>`;
    }

    /* ── MAIN APP ── */
    function KTUAnalyzer() {
      const [theme, setTheme] = useState(document.documentElement.getAttribute('data-theme') || 'dark');
      const dark = theme === 'dark' || theme === 'medium';
      const toggleTheme = useCallback(() => {
        const themes = ['dark', 'medium', 'light'];
        const cur = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = themes[(themes.indexOf(cur) + 1) % themes.length];
        document.documentElement.setAttribute('data-theme', next); setTheme(next);
      }, []);

      const [tab, setTab] = useState('upload');
      const [rawSems, setRawSems] = useState(null);
      const [analysis, setAnalysis] = useState(null);
      const [selSem, setSelSem] = useState(0);
      const [loading, setLoading] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState('Processing...');
      const [dragOver, setDragOver] = useState(false);
      const [uploadErr, setUploadErr] = useState('');
      const [search, setSearch] = useState('');
      const [deptFilter, setDeptFilter] = useState('ALL');
      const [aiState, setAiState] = useState({ loading: false, data: null, err: null });
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const fileRef = useRef();

      useEffect(() => {
        return firebase.auth().onAuthStateChanged(u => {
          setUser(u);
          setAuthLoading(false);
          // Redirec to Landing if not authenticated
          if (!u) window.location.href = 'index.html';
        });
      }, []);
      const login = () => firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
      const logout = () => firebase.auth().signOut().then(() => window.location.href = 'index.html');

      const handleFile = useCallback(async (file) => {
        if (!user) { setUploadErr('You must login via Google to upload files.'); return; }
        if (!file || file.type !== 'application/pdf') { setUploadErr('Please upload a valid PDF file.'); return; }
        setLoading(true); setUploadErr('');
        try {
          // Convert file to base64 for direct API upload
          const reader = new FileReader();
          const fileData = await new Promise((resolve, reject) => {
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });

          setLoadingMsg('⚙️ Analyzing results on secure server...');
          const res = await fetch('/api/analyzeSemester', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fileData, fileName: file.name })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Server processing error');

          setLoadingMsg('📊 Generating Excel report...');
          // Convert base64 directly to browser download — no storage needed
          window._excelData = { base64: data.excelBase64, filename: data.excelFilename };

          setRawSems(data.analysis); setAnalysis(data.analysis); setTab('overview'); setSelSem(0);
        } catch (e) { setUploadErr('Error: ' + e.message); }
        setLoading(false);
      }, [user]);

      const onDrop = useCallback(e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }, [handleFile]);
      const sem = analysis?.[selSem];
      const filteredStudents = useMemo(() => {
        if (!sem) return [];
        const all = sem.departments.flatMap(d => d.students);
        const byDept = deptFilter === 'ALL' ? all : all.filter(s => s.department === deptFilter);
        if (!search) return byDept;
        return byDept.filter(s => s.regNo.toLowerCase().includes(search.toLowerCase()));
      }, [sem, search, deptFilter]);

      const exportExcel = () => {
        if (!window._excelData) return;
        const { base64, filename } = window._excelData;
        const byteChars = atob(base64);
        const byteArr = new Uint8Array(byteChars.length);
        for (let i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
        const blob = new Blob([byteArr], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      const genAI = async () => {
        if (!sem) return; setAiState({ loading: true, data: null, err: null });
        await new Promise(r => setTimeout(r, 1500));
        try {
          const pp = parseFloat(sem.ov.pp), td = sem.ov.best, bd2 = sem.ov.worst, ts = sem.ov.tough;
          const insights = [
            { type: pp > 75 ? 'positive' : pp > 60 ? 'info' : 'warning', title: 'Overall Performance', detail: `Overall pass rate is ${pp}%. ${pp > 75 ? 'Excellent across departments.' : 'Significant room for improvement.'}` },
            td && bd2 && { type: 'info', title: 'Departmental Variance', detail: `${td.code} leads at ${td.pp}% pass, while ${bd2.code} trails at ${bd2.pp}%.` },
            ts && parseFloat(ts.pp) < 65 && { type: 'critical', title: 'Subject Alert', detail: `${ts.name} (${ts.code}) has only ${ts.pp}% pass rate.` },
          ].filter(Boolean);
          setAiState({ loading: false, data: { summary: `${pp}% pass rate. ${ts?.name || 'Key subjects'} are most challenging. ${td?.code || 'Top departments'} lead academically.`, insights, recommendations: [`Remedial classes for ${ts?.name || 'low-pass subjects'}.`, `Peer mentoring from ${td?.code} to struggling departments.`, `Early identification of at-risk students via internal marks.`] }, err: null });
        } catch (e) { setAiState({ loading: false, data: null, err: 'Analysis failed.' }); }
      };

      const bd = theme === 'dark' ? 'rgba(167,139,250,0.1)' : theme === 'medium' ? '#30363d' : 'rgba(99,102,241,0.1)';
      const txt = theme === 'dark' ? '#f8fafc' : theme === 'medium' ? '#c9d1d9' : '#0f172a';
      const mu = theme === 'dark' ? '#64748b' : theme === 'medium' ? '#6e7681' : '#94a3b8';
      const DC = ['#7c6ef5', '#10d9a8', '#f59e0b', '#ef4444', '#3b82f6', '#ec4899'];

      const TABS = [
        { id: 'upload', icon: 'fa-cloud-arrow-up', label: 'Upload' },
        { id: 'overview', icon: 'fa-chart-line', label: 'Overview', nd: true },
        { id: 'depts', icon: 'fa-building-columns', label: 'Departments', nd: true },
        { id: 'subjects', icon: 'fa-book-bookmark', label: 'Subjects', nd: true },
        { id: 'students', icon: 'fa-users-viewfinder', label: 'Students', nd: true },
        { id: 'ai', icon: 'fa-wand-magic-sparkles', label: 'AI Insights', nd: true }
      ];

      return html`<div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div style=${{ padding: '20px 16px', borderBottom: `1px solid ${bd}`, display: 'flex', alignItems: 'center', gap: 12 }}>
        <img src="assets/favicon-48x48.png" style=${{ width: 32, height: 32, borderRadius: 8, objectFit: 'contain', padding: '4px', boxShadow: '0 4px 12px rgba(124,110,245,.4)' }} alt="Logo" />
        <div>
          <div style=${{ fontFamily: "var(--font-head)", fontSize: 17, fontWeight: 800, letterSpacing: '.04em', color: 'var(--accent)', lineHeight: 1 }}>APJ AKTU RESULT</div>
          <div style=${{ fontSize: 9, letterSpacing: '.12em', color: mu, lineHeight: 1 }}>ANALYTICAL ENGINE</div>
        </div>
      </div>
      <nav style=${{ flex: 1, padding: '16px 0', overflowY: 'auto' }}>
        <div class="nav-item" onClick=${() => window.location.href = 'index.html'} style=${{ marginBottom: 12, borderBottom: `1px solid ${bd}`, borderRadius: 0, paddingBottom: 12 }}>
          <i class="fa-solid fa-house" style=${{ fontSize: 16, width: 24 }}></i><span>Dashboard Home</span>
        </div>
        ${TABS.filter(t => !t.nd || analysis).map(t => html`
          <div key=${t.id} class=${'nav-item ' + (tab === t.id ? 'nav-active' : '')} onClick=${() => setTab(t.id)}>
            <i class=${'fa-solid ' + t.icon} style=${{ fontSize: 16, width: 24 }}></i>${t.label}
          </div>`)}
      </nav>
      <div class="sidebar-footer" style=${{ padding: '16px', borderTop: `1px solid ${bd}` }}>
        <div class="dev-credit" style=${{ fontSize: '10px', lineHeight: '1.4', color: mu }}>
          Developed by <strong style=${{ color: 'var(--accent)' }}>Arun Xavier</strong><br/>
          Asst. Prof., Dept. of EEE<br/>
          Vidya Academy of Science & Technology, Thrissur
        </div>
        <div style=${{ marginTop: '12px', fontSize: '9px', fontStyle: 'italic', color: 'var(--red)', opacity: 0.8 }}>
          Note: SGPA might be slightly different from the official KTU result, since subjects in specific schemes have different credits.
        </div>
      </div>
    </aside>

    <div class="main-area">
      <!-- TOPBAR -->
      <header class="topbar">
        <div style=${{ flex: 1, fontFamily: "var(--font-head)", fontSize: 16, fontWeight: 700, color: txt, letterSpacing: '.02em' }}>
          SEMESTER RESULT <span style=${{ color: 'var(--accent)' }}>PDF ANALYZER</span>
        </div>
        <div style=${{ display: 'flex', alignItems: 'center', gap: 8 }}>
          ${analysis && rawSems?.length > 1 && html`
            <select value=${selSem} onChange=${e => { setSelSem(+e.target.value); setAiState({ loading: false, data: null, err: null }); }} style=${{ fontSize: 12, padding: '5px 10px' }}>
              ${rawSems.map((s, i) => html`<option key=${i} value=${i}>${s.label}</option>`)}</select>`}
          ${analysis && html`
            <button onClick=${exportExcel} class="btn" style=${{ padding: '6px 12px', background: 'rgba(16,217,168,.1)', color: 'var(--green)', border: '1px solid rgba(16,217,168,.25)', fontSize: 12 }}>📥 Export Excel</button>`}
          ${authLoading ? null : user ? html`
            <div style=${{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <img src=${user.photoURL} style=${{ width: 30, height: 30, borderRadius: '50%', border: '2px solid var(--accent)' }} />
              <button class="btn" onClick=${logout} style=${{ padding: '4px 10px', fontSize: 11, color: mu, background: 'transparent', border: `1px solid ${bd}` }}>Sign Out</button>
            </div>` : html`
            <button class="btn" onClick=${login} style=${{ padding: '5px 14px', background: 'var(--accent)', color: 'white', border: 'none', fontSize: 13, fontWeight: 600, display: 'flex', gap: 6, alignItems: 'center' }}><i class="fa-brands fa-google"></i> Login</button>`}
          <div class="theme-switcher" onClick=${toggleTheme} title="Change Theme">
            <div class="ts-slider" style=${{ transform: theme === 'dark' ? 'translateX(0)' : theme === 'medium' ? 'translateX(32px)' : 'translateX(64px)' }}></div>
            <div class="ts-icon" title="Obsidian Neon">🌙</div>
            <div class="ts-icon" title="Graphite Pro">🌤</div>
            <div class="ts-icon" title="Porcelain SaaS">☀️</div>
          </div>
        </div>
      </header>

      <main class="content">


      <!-- UPLOAD TAB -->
      ${tab === 'upload' && html`<div class="fadeUp" style=${{ maxWidth: 680, margin: '32px auto' }}>
        <div style=${{ textAlign: 'center', marginBottom: 40 }}>
          <div style=${{ fontFamily: "var(--font-head)", fontSize: 42, fontWeight: 800, letterSpacing: '.02em', background: 'linear-gradient(135deg,var(--accent) 40%,var(--accent))', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', lineHeight: 1, marginBottom: 12 }}>
            SEMESTER RESULT PDF ANALYSER
          </div>
          <p style=${{ color: mu, fontSize: 15, lineHeight: 1.7, maxWidth: 480, margin: '0 auto' }}>
            Upload KTU result PDFs for instant analytics, department rankings, subject difficulty analysis and AI-powered insights.
          </p>
        </div>

        ${!user && !authLoading && html`
          <div style=${{ padding: '24px', borderRadius: 12, background: 'rgba(124,110,245,.08)', border: '1px solid rgba(124,110,245,.3)', textAlign: 'center', marginBottom: 24 }}>
            <div style=${{ fontSize: 32, marginBottom: 10 }}>🔒</div>
            <div style=${{ fontWeight: 700, fontSize: 16, marginBottom: 8, color: 'var(--accent)' }}>Authentication Required</div>
            <p style=${{ color: mu, fontSize: 13, marginBottom: 16 }}>Sign in with your Google account to start analyzing KTU result PDFs securely.</p>
            <button onClick=${login} style=${{ background: 'var(--accent)', color: 'white', border: 'none', padding: '10px 24px', borderRadius: 8, fontSize: 14, cursor: 'pointer', fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 8 }}>
              <i class="fa-brands fa-google"></i> Sign in with Google
            </button>
          </div>`}

        <div onDragOver=${e => { e.preventDefault(); setDragOver(true); }} onDragLeave=${() => setDragOver(false)} onDrop=${onDrop}
          onClick=${() => !loading && user && fileRef.current?.click()}
          style=${{
            border: `2px dashed ${dragOver ? 'var(--accent)' : bd}`, borderRadius: 16, padding: '52px 24px',
            cursor: (loading || !user) ? 'default' : 'pointer',
            background: dragOver ? 'rgba(167,139,250,.06)' : dark ? 'rgba(255,255,255,.02)' : 'rgba(0,0,0,.02)',
            transition: 'all .2s', textAlign: 'center', marginBottom: 16, opacity: !user ? 0.5 : 1
          }}>
          <div style=${{ fontSize: 48, marginBottom: 16, lineHeight: 1 }}>${loading ? '⏳' : '📋'}</div>
          <div style=${{ fontSize: 16, fontWeight: 600, marginBottom: 8, color: dragOver ? 'var(--accent)' : txt }}>
            ${loading ? loadingMsg : (user ? 'Drop KTU Result PDF here' : 'Login to upload PDFs')}
          </div>
          <div style=${{ color: mu, fontSize: 13 }}>
            ${loading ? html`<span class="pulse">Please wait, this may take 20–40 seconds…</span>` : (user ? 'or click to browse — PDF files only' : '')}
          </div>
          <input ref=${fileRef} type="file" accept=".pdf" style=${{ display: 'none' }} onChange=${e => handleFile(e.target.files[0])}/>
        </div>

        ${uploadErr && html`<div style=${{ padding: '12px 16px', borderRadius: 8, background: 'rgba(244,63,94,.1)', border: '1px solid rgba(244,63,94,.25)', color: 'var(--red)', fontSize: 13, marginBottom: 16 }}>⚠ ${uploadErr}</div>`}

        <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginTop: 32 }}>
          ${[{ icon: '◈', t: 'Smart Dashboard', d: 'Bar, pie, line & radar charts' }, { icon: '⬡', t: 'Dept Rankings', d: 'Pass %, SGPA, difficulty analysis' }, { icon: '✦', t: 'AI Insights', d: 'Claude-powered trend analysis' }].map((f, i) => html`
            <div key=${i} class="card" style=${{ padding: '18px 14px', textAlign: 'center', background: dark ? 'rgba(255,255,255,.03)' : 'white' }}>
              <div style=${{ fontFamily: "var(--font-mono)", fontSize: 28, marginBottom: 8, color: 'var(--accent)' }}>${f.icon}</div>
              <div style=${{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>${f.t}</div>
              <div style=${{ fontSize: 11, color: mu }}>${f.d}</div>
            </div>`)}
        </div>
      </div>`}

      <!-- OVERVIEW TAB -->
      ${tab === 'overview' && sem && html`<div class="fadeUp">
        <div style=${{ marginBottom: '20px', padding: '0 4px' }}>
          <div style=${{ fontSize: '12px', color: 'var(--accent)', fontWeight: 600, letterSpacing: '0.1em', marginBottom: '4px' }}>${sem.meta?.semester?.toUpperCase() || 'SEMESTER ANALYSIS'}</div>
          <div style=${{ fontSize: '24px', fontWeight: 800, color: txt }}>${(sem.meta?.college || 'Unknown College').toUpperCase()}</div>
        </div>
        <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 14, marginBottom: 22 }}>
          <${StatCard} icon="◷" label="Total Students"  value=${sem.ov.totS}      color="var(--accent)" dark=${dark}/>
          <${StatCard} icon="✓" label="Overall Pass %"  value=${`${sem.ov.pp}%`}  color="var(--green)" dark=${dark}/>
          <${StatCard} icon="✗" label="Total Failed"    value=${sem.ov.totF}       color="var(--red)" dark=${dark}/>
          <${StatCard} icon="★" label="Best Department" value=${sem.ov.best?.code} color="var(--gold)" dark=${dark}/>
        </div>

        <div style=${{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 20, marginBottom: 20 }}>
          <div class="card" style=${{ padding: '20px' }}>
            <div style=${{ fontFamily: "var(--font-head)", fontSize: 16, fontWeight: 700, letterSpacing: '.03em', marginBottom: 16 }}>DEPARTMENT-WISE PASS %</div>
            <${RC.ResponsiveContainer} width="100%" height=${260}>
              <${RC.BarChart} data=${sem.departments.map(d => ({ name: d.code, Pass: +d.pp, Fail: +(100 - d.pp).toFixed(1) }))}>
                <${RC.CartesianGrid} strokeDasharray="3 3" stroke=${dark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.06)'}/>
                <${RC.XAxis} dataKey="name" tick=${{ fill: mu, fontSize: 12 }}/>
                <${RC.YAxis} domain=${[0, 100]} tick=${{ fill: mu, fontSize: 12 }}/>
                <${RC.Tooltip} content=${html`<${CTip}/>`}/>
                <${RC.Legend} wrapperStyle=${{ fontSize: 12, color: mu }}/>
                <${RC.Bar} dataKey="Pass" fill="var(--green)" radius=${[4, 4, 0, 0]} stackId="a"/>
                <${RC.Bar} dataKey="Fail" fill="var(--red)" radius=${[0, 0, 0, 0]} stackId="a"/>
              </${RC.BarChart}>
            </${RC.ResponsiveContainer}>
          </div>
          <div class="card" style=${{ padding: '20px' }}>
            <div style=${{ fontFamily: "var(--font-head)", fontSize: 16, fontWeight: 700, letterSpacing: '.03em', marginBottom: 16 }}>PASS vs FAIL DISTRIBUTION</div>
            <${RC.ResponsiveContainer} width="100%" height=${260}>
              <${RC.PieChart}>
                <${RC.Pie} data=${[{ name: 'Passed', value: +sem.ov.totP }, { name: 'Failed', value: +sem.ov.totF }]}
                  cx="50%" cy="50%" innerRadius=${65} outerRadius=${105} paddingAngle=${4} dataKey="value"
                  label=${({ name, percent }) => `${name} ${(percent * 100).toFixed(1)}%`}>
                  <${RC.Cell} fill="var(--green)"/><${RC.Cell} fill="var(--red)"/>
                </${RC.Pie}>
                <${RC.Tooltip} formatter=${v => [v + ' students']}/>
              </${RC.PieChart}>
            </${RC.ResponsiveContainer}>
          </div>
        </div>

        <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 20 }}>
          <div class="card" style=${{ padding: '20px' }}>
            <div style=${{ fontFamily: "var(--font-head)", fontSize: 16, fontWeight: 700, letterSpacing: '.03em', marginBottom: 16 }}>DEPARTMENT RADAR</div>
            <${RC.ResponsiveContainer} width="100%" height=${260}>
              <${RC.RadarChart} data=${sem.departments.map(d => ({ dept: d.code, Pass: +d.pp, SGPA: +d.avgSGPA * 10 }))}>
                <${RC.PolarGrid} stroke=${dark ? 'rgba(255,255,255,.1)' : 'rgba(0,0,0,.1)'}/>
                <${RC.PolarAngleAxis} dataKey="dept" tick=${{ fill: mu, fontSize: 12 }}/>
                <${RC.PolarRadiusAxis} domain=${[0, 100]} tick=${{ fill: mu, fontSize: 10 }}/>
                <${RC.Radar} name="Pass %" dataKey="Pass" stroke="var(--green)" fill="var(--green)" fillOpacity=${0.15}/>
                <${RC.Radar} name="SGPA×10" dataKey="SGPA" stroke="var(--accent)" fill="var(--accent)" fillOpacity=${0.12}/>
                <${RC.Legend} wrapperStyle=${{ fontSize: 12, color: mu }}/>
                <${RC.Tooltip} content=${html`<${CTip}/>`}/>
              </${RC.RadarChart}>
            </${RC.ResponsiveContainer}>
          </div>
          <div style=${{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            ${[{ icon: '🥇', title: 'Best Department', name: sem.ov.best?.name, stat: `${sem.ov.best?.pp}% pass · SGPA ${sem.ov.best?.avgSGPA}`, color: 'var(--gold)' },
          { icon: '📉', title: 'Needs Attention', name: sem.ov.worst?.name, stat: `${sem.ov.worst?.pp}% pass · SGPA ${sem.ov.worst?.avgSGPA}`, color: 'var(--red)' },
          { icon: '🔥', title: 'Toughest Subject', name: sem.ov.tough?.name, stat: `Only ${sem.ov.tough?.pp}% pass rate`, color: 'var(--accent)' },
          { icon: '⭐', title: 'Easiest Subject', name: sem.ov.easiest?.name, stat: `${sem.ov.easiest?.pp}% pass rate`, color: 'var(--green)' },
          ].map((h, i) => html`
              <div key=${i} class="card" style=${{ padding: '14px 16px', borderLeft: `3px solid ${h.color}`, display: 'flex', gap: 12, alignItems: 'center' }}>
                <span style=${{ fontSize: 22 }}>${h.icon}</span>
                <div style=${{ flex: 1, minWidth: 0 }}>
                  <div style=${{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '.07em', color: mu, marginBottom: 2 }}>${h.title}</div>
                  <div style=${{ fontWeight: 600, fontSize: 13, marginBottom: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>${h.name}</div>
                  <div style=${{ fontFamily: "var(--font-mono)", fontSize: 12, color: h.color }}>${h.stat}</div>
                </div>
              </div>`)}
          </div>
        </div>
      </div>`}

      <!-- DEPARTMENTS TAB -->
      ${tab === 'depts' && sem && html`<div class="fadeUp">
        <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16, marginBottom: 22 }}>
          ${sem.departments.map((dept, i) => html`
            <div key=${dept.code} class="card" style=${{ padding: '20px', borderTop: `3px solid ${DC[i % DC.length]}` }}>
              <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
                <div>
                  <div style=${{ fontFamily: "var(--font-head)", fontSize: 26, fontWeight: 800, letterSpacing: '.04em', color: DC[i % DC.length], lineHeight: 1 }}>${dept.code}</div>
                  <div style=${{ fontSize: 11, color: mu, marginTop: 3 }}>${dept.name}</div>
                </div>
                <span style=${{ fontSize: 11, color: mu, background: dark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.06)', padding: '3px 8px', borderRadius: 6 }}>#${i + 1}</span>
              </div>
              <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8, marginBottom: 14 }}>
                ${[{ l: 'Total', v: dept.tot, c: txt }, { l: 'Passed', v: dept.pass, c: 'var(--green)' }, { l: 'Failed', v: dept.fail, c: 'var(--red)' }].map((s, j) => html`
                  <div key=${j} style=${{ textAlign: 'center', padding: '8px 4px', background: dark ? 'rgba(255,255,255,.04)' : 'rgba(0,0,0,.04)', borderRadius: 8 }}>
                    <div style=${{ fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 600, color: s.c }}>${s.v}</div>
                    <div style=${{ fontSize: 10, color: mu, letterSpacing: '.05em' }}>${s.l}</div>
                  </div>`)}
              </div>
              <div style=${{ marginBottom: 8 }}>
                <div style=${{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 6 }}>
                  <span style=${{ color: 'var(--green)', fontWeight: 600 }}>${dept.pp}% Pass</span>
                  <span style=${{ color: 'var(--red)' }}>${(100 - parseFloat(dept.pp)).toFixed(1)}% Fail</span>
                </div>
                <${ProgBar} pct=${parseFloat(dept.pp)} color=${DC[i % DC.length]}/>
              </div>
              <div style=${{ fontSize: 12, color: mu }}>Avg SGPA: <span style=${{ fontFamily: "var(--font-mono)", color: 'var(--accent)', fontWeight: 600 }}>${dept.avgSGPA}</span></div>
            </div>`)}
        </div>
        <div class="card">
          <div style=${{ padding: '16px 20px', borderBottom: `1px solid ${bd}` }}>
            <div style=${{ fontFamily: "var(--font-head)", fontSize: 16, fontWeight: 700, letterSpacing: '.03em' }}>DEPARTMENT RANKINGS TABLE</div>
          </div>
          <table>
            <thead><tr><th>Rank</th><th>Code</th><th>Department</th><th>Total</th><th>Passed</th><th>Failed</th><th>Pass %</th><th>Avg SGPA</th></tr></thead>
            <tbody>
              ${sem.departments.map((d, i) => html`
                <tr key=${d.code}>
                  <td><span style=${{ fontWeight: 600, color: i === 0 ? 'var(--gold)' : mu }}>#${i + 1}</span></td>
                  <td><span style=${{ fontFamily: "var(--font-mono)", fontWeight: 600, color: DC[i % DC.length] }}>${d.code}</span></td>
                  <td style=${{ color: mu, fontSize: 12 }}>${d.name}</td>
                  <td style=${{ fontFamily: "var(--font-mono)" }}>${d.tot}</td>
                  <td style=${{ fontFamily: "var(--font-mono)", color: 'var(--green)' }}>${d.pass}</td>
                  <td style=${{ fontFamily: "var(--font-mono)", color: 'var(--red)' }}>${d.fail}</td>
                  <td><div style=${{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 110 }}>
                    <div style=${{ width: 50, flexShrink: 0 }}><${ProgBar} pct=${parseFloat(d.pp)} color=${DC[i % DC.length]} h=${5}/></div>
                    <span style=${{ fontFamily: "var(--font-mono)", color: DC[i % DC.length], fontWeight: 600, fontSize: 13 }}>${d.pp}%</span>
                  </div></td>
                  <td><span style=${{ fontFamily: "var(--font-mono)", color: 'var(--accent)' }}>${d.avgSGPA}</span></td>
                </tr>`)}
            </tbody>
          </table>
        </div>
      </div>`}

      <!-- SUBJECTS TAB -->
      ${tab === 'subjects' && sem && html`<div class="fadeUp">
        <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 14, marginBottom: 22 }}>
          <${StatCard} icon="◉" label="Total Subjects"   value=${sem.ov.allSubs.length}         color="var(--accent)" dark=${dark}/>
          <${StatCard} icon="🔥" label="Toughest Subject" value=${`${sem.ov.tough?.pp}% pass`}  color="var(--red)" dark=${dark}/>
          <${StatCard} icon="⭐" label="Easiest Subject"  value=${`${sem.ov.easiest?.pp}% pass`} color="var(--green)" dark=${dark}/>
        </div>
        <div class="scrollArea" style=${{ maxHeight: 'calc(100vh - 280px)', marginTop: 10 }}>
          ${sem.departments.map((dept, di) => html`
            <div key=${dept.code} class="card" style=${{ marginBottom: 18 }}>
              <div style=${{ padding: '14px 20px', borderBottom: `1px solid ${bd}`, display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style=${{ fontFamily: "var(--font-mono)", fontWeight: 600, fontSize: 14, color: DC[di % DC.length] }}>${dept.code}</span>
                <span style=${{ fontSize: 13, color: mu }}>— ${dept.name}</span>
              </div>
              <table>
                <thead><tr><th>Code</th><th>Subject Name</th><th>Total</th><th>Passed</th><th>Failed</th><th>Pass %</th><th>Difficulty</th></tr></thead>
                <tbody>
                  ${[...dept.subjects].sort((a, b) => parseFloat(a.pp) - parseFloat(b.pp)).map(sub => {
            const p = parseFloat(sub.pp), [cls, lbl] = p < 60 ? ['diffH', 'Hard'] : p < 78 ? ['diffM', 'Medium'] : ['diffE', 'Easy'], barColor = p < 60 ? 'var(--red)' : p < 78 ? 'var(--gold)' : 'var(--green)';
            return html`<tr key=${sub.code}>
                      <td><span style=${{ fontFamily: "var(--font-mono)", color: 'var(--accent)', fontSize: 12 }}>${sub.code}</span></td>
                      <td style=${{ maxWidth: 220, fontSize: 13 }}>${sub.name}</td>
                      <td style=${{ fontFamily: "var(--font-mono)" }}>${sub.total}</td>
                      <td style=${{ fontFamily: "var(--font-mono)", color: 'var(--green)' }}>${sub.passed}</td>
                      <td style=${{ fontFamily: "var(--font-mono)", color: 'var(--red)' }}>${sub.failed}</td>
                      <td style=${{ minWidth: 130 }}><div style=${{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style=${{ width: 50, flexShrink: 0 }}><${ProgBar} pct=${p} color=${barColor} h=${5}/></div>
                        <span style=${{ fontFamily: "var(--font-mono)", fontWeight: 600, fontSize: 13, color: barColor }}>${sub.pp}%</span>
                      </div></td>
                      <td><span class=${'btn ' + cls} style=${{ padding: '2px 10px', fontSize: 11, fontWeight: 600, borderRadius: 20 }}>${lbl}</span></td>
                    </tr>`;
          })}
                </tbody>
              </table>
            </div>`)}
        </div>
      </div>`}

      <!-- STUDENTS TAB -->
      ${tab === 'students' && sem && html`<div class="fadeUp">
        <div style=${{ display: 'flex', gap: 12, marginBottom: 18, flexWrap: 'wrap', alignItems: 'center' }}>
          <input value=${search} onChange=${e => setSearch(e.target.value)} placeholder="Search by registration number…" style=${{ width: 280 }}/>
          <select value=${deptFilter} onChange=${e => setDeptFilter(e.target.value)} style=${{ width: 160 }}>
            <option value="ALL">All Departments</option>
            ${sem.departments.map(d => html`<option key=${d.code} value=${d.code}>${d.code} — ${d.name}</option>`)}
          </select>
          <div style=${{ color: mu, fontSize: 13 }}>Showing <span style=${{ color: txt, fontWeight: 600 }}>${Math.min(filteredStudents.length, 200)}</span>${filteredStudents.length > 200 ? ' of ' + filteredStudents.length : ''} students</div>
        </div>
        <div class="card" style=${{ overflowX: 'auto' }}>
          <table>
            <thead><tr><th>#</th><th>Reg. No.</th><th>Dept</th><th>SGPA</th><th>Status</th><th>Passed</th><th>Failed</th></tr></thead>
            <tbody>
              ${filteredStudents.slice(0, 200).map((stu, i) => {
            const passCount = stu.subjects.filter(s => s.passed).length, failCount = stu.subjects.length - passCount, di = sem.departments.findIndex(d => d.code === stu.department);
            return html`<tr key=${i}>
                  <td style=${{ color: mu, fontSize: 11 }}>${i + 1}</td>
                  <td><span style=${{ fontFamily: "var(--font-mono)", fontSize: 12, color: mu }}>${stu.regNo}</span></td>
                  <td><span style=${{ fontFamily: "var(--font-mono)", fontSize: 12, fontWeight: 600, color: DC[di >= 0 ? di % DC.length : 0] }}>${stu.department}</span></td>
                  <td><span style=${{ fontFamily: "var(--font-mono)", color: 'var(--accent)', fontWeight: 600 }}>${stu.sgpa}</span></td>
                  <td><${Badge} label=${stu.allPassed ? 'PASS' : 'FAIL'} ok=${stu.allPassed}/></td>
                  <td><span style=${{ fontFamily: "var(--font-mono)", color: 'var(--green)' }}>${passCount}</span></td>
                  <td><span style=${{ fontFamily: "var(--font-mono)", color: failCount > 0 ? 'var(--red)' : mu }}>${failCount}</span></td>
                </tr>`;
          })}
            </tbody>
          </table>
        </div>
      </div>`}

      <!-- AI INSIGHTS TAB -->
      ${tab === 'ai' && sem && html`<div class="fadeUp" style=${{ maxWidth: 920, margin: '0 auto' }}>
        <div style=${{ textAlign: 'center', marginBottom: 32 }}>
          <div style=${{ fontFamily: "var(--font-head)", fontSize: 36, fontWeight: 800, letterSpacing: '.03em', background: 'linear-gradient(135deg,var(--accent),var(--accent))', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: 8 }}>AI PERFORMANCE INSIGHTS</div>
          <p style=${{ color: mu, fontSize: 14 }}>Powered by AI — analyzes ${sem.ov.totS} students across ${sem.departments.length} departments</p>
        </div>

        ${!aiState.data && !aiState.loading && html`
          <div class="card" style=${{ padding: '48px 24px', textAlign: 'center', marginBottom: 20 }}>
            <div style=${{ fontSize: 48, marginBottom: 16, color: 'var(--accent)' }}>✦</div>
            <div style=${{ fontWeight: 600, fontSize: 16, marginBottom: 10 }}>Ready to Analyze</div>
            <p style=${{ color: mu, fontSize: 13, lineHeight: 1.7, maxWidth: 440, margin: '0 auto 28px' }}>AI will analyze performance, identify difficulty patterns, and generate actionable recommendations.</p>
            <button onClick=${genAI} class="btn" style=${{ padding: '14px 36px', fontSize: 15, fontWeight: 600, background: 'var(--accent)', color: 'white', border: 'none' }}>✦ Generate AI Insights</button>
          </div>`}

        ${aiState.loading && html`
          <div class="card" style=${{ padding: '56px', textAlign: 'center' }}>
            <div style=${{ fontSize: 40, marginBottom: 16, color: 'var(--accent)' }} class="pulse">✦</div>
            <div style=${{ fontFamily: "var(--font-head)", fontSize: 20, letterSpacing: '.06em', color: 'var(--accent)', marginBottom: 8 }}>ANALYZING DATA…</div>
            <div style=${{ color: mu, fontSize: 13 }}>Processing result patterns</div>
          </div>`}

        ${aiState.data && html`<div>
          ${aiState.data.summary && html`
            <div class="card" style=${{ padding: '20px 24px', marginBottom: 16, borderLeft: '3px solid var(--accent)' }}>
              <div style=${{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '.09em', color: 'var(--accent)', marginBottom: 8, fontWeight: 600 }}>Executive Summary</div>
              <p style=${{ fontSize: 14, lineHeight: 1.75, color: txt }}>${aiState.data.summary}</p>
            </div>`}
          <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 16 }}>
            ${aiState.data.insights?.map((ins, i) => {
            const colMap = { positive: 'var(--green)', warning: 'var(--gold)', critical: 'var(--red)', info: 'var(--accent)' };
            const icoMap = { positive: '✓', warning: '⚠', critical: '✗', info: '◈' };
            const c = colMap[ins.type] || 'var(--accent)';
            return html`<div key=${i} class="card" style=${{ padding: '18px 20px', borderLeft: `3px solid ${c}` }}>
                <div style=${{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                  <span style=${{ fontSize: 14, color: c, flexShrink: 0, marginTop: 1 }}>${icoMap[ins.type] || '◈'}</span>
                  <div>
                    <div style=${{ fontWeight: 600, fontSize: 13, marginBottom: 6, color: c }}>${ins.title}</div>
                    <div style=${{ fontSize: 13, color: mu, lineHeight: 1.65 }}>${ins.detail}</div>
                  </div>
                </div>
              </div>`;
          })}
          </div>
          ${aiState.data.recommendations?.length > 0 && html`
            <div class="card" style=${{ padding: '20px 24px', marginBottom: 16 }}>
              <div style=${{ fontFamily: "var(--font-head)", fontSize: 16, fontWeight: 700, letterSpacing: '.03em', marginBottom: 14 }}>RECOMMENDATIONS</div>
              ${aiState.data.recommendations.map((rec, i) => html`
                <div key=${i} style=${{ display: 'flex', gap: 12, padding: '10px 0', borderBottom: i < aiState.data.recommendations.length - 1 ? `1px solid ${dark ? 'rgba(48,54,61,.5)' : 'rgba(0,0,0,.08)'}` : '' }}>
                  <div style=${{ width: 24, height: 24, borderRadius: 6, background: 'rgba(167,139,250,.12)', border: '1px solid rgba(167,139,250,.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 600, color: 'var(--accent)', flexShrink: 0 }}>${i + 1}</div>
                  <div style=${{ fontSize: 13, lineHeight: 1.65, color: txt }}>${rec}</div>
                </div>`)}
            </div>`}
          <div style=${{ textAlign: 'center' }}>
            <button onClick=${genAI} class="btn" style=${{ padding: '9px 22px', background: 'rgba(167,139,250,.08)', color: 'var(--accent)', border: '1px solid rgba(167,139,250,.2)', fontSize: 13 }}>↺ Regenerate</button>
          </div>
        </div>`}

        ${aiState.err && html`
          <div class="card" style=${{ padding: '32px', textAlign: 'center', borderLeft: '3px solid var(--red)' }}>
            <div style=${{ color: 'var(--red)', fontWeight: 600, marginBottom: 8 }}>✗ Error</div>
            <div style=${{ color: mu, fontSize: 13, marginBottom: 20 }}>${aiState.err}</div>
            <button onClick=${genAI} class="btn" style=${{ padding: '9px 22px', background: 'rgba(244,63,94,.1)', color: 'var(--red)', border: '1px solid rgba(244,63,94,.25)', fontSize: 13 }}>Try Again</button>
          </div>`}
      </div>`}

      </main>
    </div>
  </div>`;
    }

    // Basic deterrent for Right Click & Inspect
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => {
      if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(KTUAnalyzer));
  </script>
</body>

</html>
